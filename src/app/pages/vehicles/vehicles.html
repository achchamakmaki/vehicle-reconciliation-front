<section class="page">
  <div class="page-heading">
    <span>Gestion flotte</span>
    <h2>Vehicules</h2>
  </div>

  <form class="form-card" (ngSubmit)="save()">
    <input name="matricule" placeholder="Matricule" [(ngModel)]="form.matricule" required />
    <input name="marque" placeholder="Marque" [(ngModel)]="form.marque" />
    <input name="modele" placeholder="Modele" [(ngModel)]="form.modele" />
    <input name="type" placeholder="Type" [(ngModel)]="form.type" />
    <select name="status" [(ngModel)]="form.status">
      <option value="CONFORME">CONFORME</option>
      <option value="ABSENT_IN_SAGE">ABSENT_IN_SAGE</option>
      <option value="ABSENT_IN_NARSA">ABSENT_IN_NARSA</option>
    </select>
    <input name="sageReference" placeholder="Reference Sage" [(ngModel)]="form.sageReference" />
    <input name="narsaReference" placeholder="Reference NARSA" [(ngModel)]="form.narsaReference" />
    <button type="submit">{{ form.id ? 'Modifier' : 'Ajouter' }}</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>Matricule</th>
        <th>Marque</th>
        <th>Modele</th>
        <th>Type</th>
        <th>Statut</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let vehicle of vehicles">
        <td>{{ vehicle.matricule }}</td>
        <td>{{ vehicle.marque || '-' }}</td>
        <td>{{ vehicle.modele || '-' }}</td>
        <td>{{ vehicle.type || '-' }}</td>
        <td>
          <span class="status-badge" [ngClass]="statusClass(vehicle.status)">
            {{ statusLabel(vehicle.status) }}
          </span>
        </td>
        <td>
          <button type="button" class="secondary" (click)="edit(vehicle)">Modifier</button>
          <button type="button" class="danger" (click)="delete(vehicle.id)">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>
</section>
