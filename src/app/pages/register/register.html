<main class="auth-page">
  <section class="auth-card">
    <div class="auth-heading">
      <span>Jbel Annour</span>
      <h1>Creation de compte</h1>
      <p>Ajoutez un utilisateur interne pour acceder au dashboard.</p>
    </div>

    <form (ngSubmit)="register()">
      <label>
        Nom complet
        <input type="text" name="fullName" [(ngModel)]="fullName" required />
      </label>

      <label>
        Email
        <input type="email" name="email" [(ngModel)]="email" required />
      </label>

      <label>
        Mot de passe
        <input type="password" name="password" [(ngModel)]="password" required />
      </label>

      <label>
        Role
        <select name="role" [(ngModel)]="role">
          <option value="USER">USER</option>
          <option value="ADMIN">ADMIN</option>
        </select>
      </label>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit">Creer le compte</button>
    </form>

    <p class="auth-link">Deja inscrit ? <a routerLink="/login">Se connecter</a></p>
  </section>
</main>
