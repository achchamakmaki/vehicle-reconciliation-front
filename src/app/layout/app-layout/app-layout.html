<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark">JA</span>
      <div>
        <strong>Jbel Annour</strong>
        <small>Gestion flotte</small>
      </div>
    </div>

    <nav class="navigation" aria-label="Navigation principale">
      <a
        *ngFor="let item of navigationItems"
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
      >
        {{ item.label }}
        <small *ngIf="item.adminOnly && !authService.isAdmin()">ADMIN</small>
      </a>
    </nav>

    <button class="logout" type="button" (click)="logout()">Deconnexion</button>
  </aside>

  <main class="main-panel">
    <header class="topbar">
      <div>
        <span>Application interne</span>
        <h1>Gestion flotte Jbel Annour</h1>
      </div>
    </header>

    <section class="content">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
